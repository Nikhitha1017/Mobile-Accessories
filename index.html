<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Accessories Store</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZZ1YPZ4WS0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-ZZ1YPZ4WS0');
</script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }
    header {
      background-color: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    h2 {
      color: #333;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }
    .product {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>

<header>
  <h1>📱 Trending Mobile Accessories</h1>
</header>

<div class="container">

  <!-- Phone Protection -->
  <h2>Phone Protection</h2>

  <div class="product">
    <h3>Silicone Phone Case</h3>
    <p>Price: ₹299</p>
    <button onclick="trackClick('Silicone Phone Case',299)">Buy Now</button>
  </div>

  <div class="product">
    <h3>Tempered Glass Screen Protector</h3>
    <p>Price: ₹199</p>
    <button onclick="trackClick('Screen Protector',199)">Buy Now</button>
  </div>

  <!-- Charging Accessories -->
  <h2>Charging Essentials</h2>

  <div class="product">
    <h3>Fast Charger 20W</h3>
    <p>Price: ₹499</p>
    <button onclick="trackClick('Fast Charger',499)">Buy Now</button>
  </div>

  <div class="product">
    <h3>Power Bank 10000mAh</h3>
    <p>Price: ₹999</p>
    <button onclick="trackClick('Power Bank',999)">Buy Now</button>
  </div>

  <!-- Audio -->
  <h2>Audio Accessories</h2>

  <div class="product">
    <h3>Wireless Earbuds</h3>
    <p>Price: ₹1299</p>
    <button onclick="trackClick('Wireless Earbuds',1299)">Buy Now</button>
  </div>

  <div class="product">
    <h3>Bluetooth Speaker</h3>
    <p>Price: ₹1499</p>
    <button onclick="trackClick('Bluetooth Speaker',1499)">Buy Now</button>
  </div>

</div>

<script>
  function trackClick(productName, price) {
    gtag('event', 'purchase_click', {
      event_category: 'ecommerce',
      event_label: productName,
      value: price
    });

    alert(productName + " clicked!");
  }
</script>

</body>
</html>
